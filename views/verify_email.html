<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Email Verification</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
    <h1>Email Verification</h1>
    <div id="verifyMessage">
        <!-- Default instruction -->
        <p>Please check your email for a verification link.</p>
    </div>

    <script>
        // Display appropriate message based on URL parameters (set by the controller after verification attempt)
        const params = new URLSearchParams(window.location.search);
        if (params.get('status') === 'success') {
            document.getElementById('verifyMessage').innerHTML = 
              "<p>Your email has been verified successfully. You can now <a href='login.html'>log in</a>.</p>";
        } else if (params.get('status') === 'error') {
            document.getElementById('verifyMessage').innerHTML = 
              "<p>Invalid or expired verification link.</p>";
        }
    </script>

    <script src="/assets/js/auth.js"></script>
</body>
</html>
