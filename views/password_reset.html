<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Password Reset</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
    <h1>Password Reset</h1>

    <!-- Section to request password reset (enter email) -->
    <div id="requestResetSection">
        <p>Enter your email to reset your password:</p>
        <form id="requestResetForm">
            <label for="resetEmail">Email:</label>
            <input type="email" id="resetEmail" name="email" required />
            <button type="submit">Send Reset Email</button>
        </form>
    </div>

    <!-- Section to enter new password (hidden by default, shown when token is present) -->
    <div id="newPasswordSection" style="display: none;">
        <p>Enter your new password:</p>
        <form id="newPasswordForm">
            <label for="newPassword">New Password:</label>
            <input type="password" id="newPassword" name="new_password" required />
            <br />

            <label for="confirmNewPassword">Confirm New Password:</label>
            <input type="password" id="confirmNewPassword" name="confirm_new_password" required />
            <!-- Hidden field to hold the reset token from URL -->
            <input type="hidden" id="resetToken" name="token" />
            <br />

            <button type="submit">Reset Password</button>
        </form>
    </div>

    <div id="resetMessage"></div>

    <!-- Script to toggle form display if token is present in URL -->
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.has('token')) {
            document.getElementById('requestResetSection').style.display = 'none';
            document.getElementById('newPasswordSection').style.display = 'block';
            // Set the token value in the hidden input for use in form submission
            document.getElementById('resetToken').value = params.get('token');
        }
    </script>

    <script src="/assets/js/auth.js"></script>
</body>
</html>
